    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      height: 100vh;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      background: linear-gradient(135deg, #0a0a1a 0%, #0d0d2b 40%, #1a0a2e 70%, #0a0a1a 100%);
      overflow: hidden; position: relative;
    }
    body::before {
      content: ""; position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(80,0,180,0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(80,0,180,0.07) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: gridMove 8s linear infinite; pointer-events: none;
    }
    body::after {
      content: ""; position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 600px 400px at 20% 30%, rgba(120,0,255,0.1) 0%, transparent 70%),
        radial-gradient(ellipse 500px 300px at 80% 70%, rgba(0,180,255,0.07) 0%, transparent 70%),
        radial-gradient(ellipse 400px 400px at 50% 50%, rgba(180,0,255,0.05) 0%, transparent 60%);
      pointer-events: none; animation: nebulaShift 10s ease-in-out infinite alternate;
    }
    @keyframes gridMove { to { transform: translateY(60px); } }
    @keyframes nebulaShift { to { opacity: 1; transform: scale(1.05); } }
    .float-layer { position: fixed; inset: 0; pointer-events: none; z-index: 5; overflow: hidden; }
    .star { position: absolute; border-radius: 50%; animation: floatUp linear infinite; }
    .mushroom {
      position: absolute; bottom: -100px;
      animation: floatUp linear infinite;
      filter: drop-shadow(0 0 10px rgba(220,60,60,0.5));
    }
    @keyframes floatUp {
      0%   { transform: translateY(0); opacity: 0; }
      8%   { opacity: 1; }
      92%  { opacity: 1; }
      100% { transform: translateY(calc(-100vh - 140px)); opacity: 0; }
    }
    .card { position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; gap: 18px; }
    .welcome {
      font-family: "KaturCoffee", cursive; font-size: 22px;
      color: rgba(200,160,255,0.85); letter-spacing: 4px;
      animation: welcomeFade 3s ease-in-out infinite alternate;
    }
    @keyframes welcomeFade { from { opacity: 0.5; } to { opacity: 1; } }
    .glitch {
      font-family: "KaturCoffee", cursive; font-size: 100px;
      color: #c084fc; position: relative;
      animation: flicker 2s infinite alternate; letter-spacing: 6px;
      text-shadow: 0 0 15px rgba(180,80,255,0.8), 0 0 40px rgba(140,40,255,0.4);
      cursor: pointer; transition: transform 0.2s, text-shadow 0.2s;
    }
    .glitch:hover { text-shadow: 0 0 20px rgba(200,100,255,1), 0 0 60px rgba(160,60,255,0.7); }
    .glitch:active { transform: scale(1.08); color: #e0aaff; }
    .glitch::before, .glitch::after {
      content: attr(data-text); position: absolute; left: 0; top: 0;
      width: 100%; overflow: hidden; clip: rect(0,0,0,0); pointer-events: none;
    }
    .glitch::before { animation: glitchTop 2s infinite linear alternate-reverse; color:#fff; }
    .glitch::after  { animation: glitchBottom 1.5s infinite linear alternate-reverse; color:#7c3aed; }
    @keyframes glitchTop {
      0%{clip:rect(0,900px,0,0);}20%{clip:rect(0,900px,100px,0);transform:translate(-5px,-5px);}
      40%{clip:rect(0,900px,30px,0);transform:translate(5px,5px);}60%{clip:rect(0,900px,60px,0);transform:translate(-5px,0);}
      80%{clip:rect(0,900px,40px,0);transform:translate(5px,-2px);}100%{clip:rect(0,900px,80px,0);transform:translate(0,0);}
    }
    @keyframes glitchBottom {
      0%{clip:rect(0,900px,0,0);}20%{clip:rect(0,900px,80px,0);transform:translate(5px,5px);}
      40%{clip:rect(0,900px,40px,0);transform:translate(-5px,-5px);}60%{clip:rect(0,900px,70px,0);transform:translate(5px,0);}
      80%{clip:rect(0,900px,30px,0);transform:translate(-5px,2px);}100%{clip:rect(0,900px,60px,0);transform:translate(0,0);}
    }
    @keyframes flicker { 0%,100%{opacity:1;}45%{opacity:0.85;}50%{opacity:0.65;}55%{opacity:0.9;} }
    .separator {
      width: 200px; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(160,80,255,0.5), transparent);
      animation: pulse 3s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:0.4;width:180px;}50%{opacity:0.9;width:240px;} }
    pre#console { color: rgba(180,130,255,0.5); font-size: 12px; font-family: monospace; min-height: 16px; }
    .contact {
      position: fixed; bottom: 22px; left: 0; right: 0;
      display: flex; justify-content: center; gap: 40px; z-index: 20;
    }
    .contact-item {
      font-family: "KaturCoffee", cursive; font-size: 13px;
      color: rgba(180,130,255,0.45); letter-spacing: 1px;
      display: flex; align-items: center; gap: 6px;
    }
    .contact-item .label { color: rgba(140,100,220,0.55); }
    .contact-item .value { color: rgba(210,170,255,0.8); }
  </style>
